name: Mirror single image (ad-hoc)

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Full source image reference (e.g. ghcr.io/org/image:tag)"
        required: true
      destination:
        description: "Full destination image reference (e.g. quay.io/org/image:tag)"
        required: true
      open_pr:
        description: "Open a PR to add this image to mirror-config.yaml"
        type: boolean
        default: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Log in to Quay.io
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Mirror image
        env:
          SOURCE: ${{ inputs.source }}
          DESTINATION: ${{ inputs.destination }}
        run: python mirror.py adhoc "$SOURCE" "$DESTINATION"

      - name: Update config file
        if: inputs.open_pr == true
        env:
          SOURCE: ${{ inputs.source }}
          DESTINATION: ${{ inputs.destination }}
        run: python mirror.py update-config "$SOURCE" "$DESTINATION"

      - name: Create pull request
        if: inputs.open_pr == true
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "mirror: add ${{ inputs.source }} to config"
          title: "mirror: add ${{ inputs.source }}"
          body: |
            Automatically generated by the ad-hoc mirror workflow.

            Adds synchronization of `${{ inputs.source }}` → `${{ inputs.destination }}` to `mirror-config.yaml`.
          branch: mirror/add-${{ github.run_id }}
          delete-branch: true
