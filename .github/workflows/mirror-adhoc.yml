name: Mirror single image (ad-hoc)

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Full source image reference (e.g. ghcr.io/org/image:tag)"
        required: true
      destination:
        description: "Full destination image reference (e.g. quay.io/org/image:tag)"
        required: true

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Log in to Quay.io
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Mirror image
        env:
          SOURCE: ${{ inputs.source }}
          DESTINATION: ${{ inputs.destination }}
        run: python mirror.py adhoc "$SOURCE" "$DESTINATION"
